<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Reel — Search</title>
  <link rel="stylesheet" href="style.css" />
</head>
<body>
  <header class="navbar">
    <a href="index.html" class="logo">Reel</a>
    <nav>
      <a href="index.html">Home</a>
      <a href="search.html" class="active">Search</a>
      <a href="favorites.html">Favorites</a>
      <a href="watchlist.html">Watchlist</a>
    </nav>
    <div class="search-bar">
      <svg viewBox="0 0 24 24" fill="none" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
        <circle cx="11" cy="11" r="8"/><line x1="21" y1="21" x2="16.65" y2="16.65"/>
      </svg>
      <input
        type="text"
        id="search-input"
        placeholder="Search movies, cast..."
        autocomplete="off"
        autofocus
      />
    </div>
  </header>
  <main class="search-page">
    <div id="results-count" class="search-results-count" style="display:none;">
      Showing
       <span id="results-num">0</span>
        results for "<span id="results-query"></span>"
    </div>
    <div id="search-results" class="movies-grid">
      <div class="empty-state" style="grid-column:1/-1;">
        <div class="empty-icon">🔍</div>
        <p>Search for any movie by title, genre, or actor name.</p>
      </div>
    </div>
  </main>
  <div id="modal-overlay" class="modal-overlay">
    <div class="modal">
      <button class="modal-close" onclick="closeModal()">✕</button>
      <div id="modal-content"></div>
    </div>
  </div>
  <div id="toast" class="toast"></div>
  <script src="api.js"></script>
  <script src="storage.js"></script>
  <script src="modal.js"></script>
  <script src="search.js"></script>
</body>
</html>
