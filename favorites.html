<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Reel — Favorites</title>
  <link rel="stylesheet" href="style.css" />
</head>
<body>
  <header class="navbar">
    <a href="index.html" class="logo">Reel</a>
    <nav>
      <a href="index.html">Home</a>
      <a href="search.html">Search</a>
      <a href="favorites.html" class="active">Favorites</a>
      <a href="watchlist.html">Watchlist</a>
    </nav>
    <div class="search-bar">
      <svg viewBox="0 0 24 24" fill="none" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
        <circle cx="11" cy="11" r="8"/><line x1="21" y1="21" x2="16.65" y2="16.65"/>
      </svg>
      <input
        type="text"
        id="nav-search"
        placeholder="Search movies, cast..."
        autocomplete="off"
      />
    </div>
  </header>
  <div class="page-header">
    <h1>♥ Favorites</h1>
    <p id="fav-count">Loading...</p>
  </div>
  <div id="favorites-grid" class="movies-grid"></div>
  <div id="modal-overlay" class="modal-overlay">
    <div class="modal">
      <button class="modal-close" onclick="closeModal()">✕</button>
      <div id="modal-content"></div>
    </div>
  </div>
  <div id="toast" class="toast"></div>
  <script src="api.js"></script>
  <script src="storage.js"></script>
  <script src="modal.js"></script>
  <script src="favorites.js"></script>
</body>
</html>
